<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>PLGuesser – Daily Premier League Player Quiz</title>
<meta name="description" content="Guess the mystery Premier League player in 8 tries. A new player every day!"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet"/>
<!-- AdSense tag goes here later -->
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:#f5f3f0;color:#1a1a1a;min-height:100vh}
#app{max-width:640px;margin:0 auto;padding:1.5rem 1rem}
.logo{font-family:'Bebas Neue',sans-serif;font-size:2.4rem;letter-spacing:2px;color:#1a1a1a;line-height:1}
.logo span{color:#37003c}
.subtitle{font-size:13px;color:#666;margin-top:4px;margin-bottom:1.2rem}
.ad-slot{background:#e8e5e0;border:1px dashed #bbb;border-radius:8px;padding:1rem;text-align:center;font-size:12px;color:#999;margin:0.8rem 0;min-height:60px;display:flex;align-items:center;justify-content:center}
.hint-box{background:#fff;border-radius:10px;padding:1rem;margin-bottom:1rem;font-size:14px;line-height:1.7;border:1px solid #e0ddd8}
.hint-box strong{display:block;font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:#999;margin-bottom:4px}
.attempts{font-size:13px;color:#666;margin-bottom:.75rem}
.attempts strong{color:#1a1a1a}
.legend{display:flex;gap:12px;margin-bottom:.75rem;flex-wrap:wrap}
.legend-item{display:flex;align-items:center;gap:5px;font-size:11px;color:#666}
.legend-dot{width:12px;height:12px;border-radius:3px}
.grid-header{display:grid;grid-template-columns:2fr 1fr 1fr 1fr 1fr 1fr;gap:4px;margin-bottom:5px}
.grid-header span{font-size:10px;font-weight:500;color:#999;text-align:center;text-transform:uppercase;letter-spacing:.5px}
.grid-header span:first-child{text-align:left;padding-left:6px}
.guess-row{display:grid;grid-template-columns:2fr 1fr 1fr 1fr 1fr 1fr;gap:4px;margin-bottom:4px;animation:slideIn .3s ease}
@keyframes slideIn{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
.cell{padding:8px 4px;border-radius:6px;font-size:12px;font-weight:500;text-align:center;display:flex;align-items:center;justify-content:center;min-height:42px;border:1px solid transparent}
.cell.name{text-align:left;justify-content:flex-start;padding-left:8px;font-size:11px}
.cell.correct{background:#00c853;color:#fff}
.cell.wrong{background:#e8e5e0;color:#555;border-color:#ddd}
.cell.partial{background:#ffa500;color:#fff}
.suggestions{position:relative;margin-bottom:1rem}
.guess-form{display:flex;gap:8px}
.guess-form input{flex:1;padding:10px 14px;border:1.5px solid #ddd;border-radius:8px;font-size:15px;font-family:inherit;background:#fff;color:#1a1a1a;outline:none}
.guess-form input:focus{border-color:#37003c}
.guess-form button{padding:10px 20px;background:#37003c;color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:500;cursor:pointer;font-family:inherit}
.guess-form button:hover{background:#5a0060}
.suggest-list{position:absolute;top:48px;left:0;right:90px;background:#fff;border:1px solid #ddd;border-radius:8px;z-index:10;max-height:200px;overflow-y:auto;box-shadow:0 4px 12px rgba(0,0,0,.1)}
.suggest-item{padding:10px 14px;font-size:14px;cursor:pointer;color:#1a1a1a}
.suggest-item:hover{background:#f5f3f0}
.result-box{background:#fff;border-radius:12px;padding:1.5rem;text-align:center;margin-top:1rem;border:1px solid #e0ddd8}
.result-box h2{font-family:'Bebas Neue',sans-serif;font-size:2rem;letter-spacing:1px;margin-bottom:.5rem;color:#37003c}
.result-box p{font-size:14px;color:#666;margin-bottom:1rem}
.result-box button{padding:10px 24px;background:#37003c;color:#fff;border:none;border-radius:8px;font-size:14px;cursor:pointer;font-family:inherit}
.share-btn{margin-left:8px;background:#25D366;padding:10px 18px;border:none;border-radius:8px;color:#fff;font-size:14px;cursor:pointer;font-family:inherit}
</style>
</head>
<body>
<div id="app">
  <div class="logo">⚽ PLGuesser<span>.</span></div>
  <div class="subtitle">Guess today's Premier League player in 8 tries · New player every day</div>

  <div class="ad-slot" id="ad-top">Advertisement</div>

  <div class="hint-box">
    <strong>Today's clue</strong>
    <span id="clue-text"></span>
  </div>

  <div class="attempts">Attempt <strong id="attempt-num">1</strong> / 8</div>

  <div class="legend">
    <div class="legend-item"><div class="legend-dot" style="background:#00c853"></div> Correct</div>
    <div class="legend-item"><div class="legend-dot" style="background:#ffa500"></div> Close</div>
    <div class="legend-item"><div class="legend-dot" style="background:#e8e5e0;border:1px solid #ddd"></div> Wrong</div>
  </div>

  <div class="grid-header">
    <span>Player</span>
    <span>Nation</span>
    <span>Club</span>
    <span>Pos</span>
    <span>Age</span>
    <span>No.</span>
  </div>

  <div id="guesses"></div>

  <div class="suggestions">
    <div class="guess-form">
      <input type="text" id="guess-input" placeholder="Type a player name..." autocomplete="off"/>
      <button onclick="submitGuess()">Guess</button>
    </div>
    <div class="suggest-list" id="suggest-list" style="display:none"></div>
  </div>

  <div id="result-area"></div>
  <div class="ad-slot" style="margin-top:1.5rem">Advertisement</div>
</div>

<script>
const PLAYERS = [
  {name:"Mohamed Salah",nation:"Egypt",club:"Liverpool",pos:"FWD",age:32,number:11},
  {name:"Erling Haaland",nation:"Norway",club:"Man City",pos:"FWD",age:23,number:9},
  {name:"Bukayo Saka",nation:"England",club:"Arsenal",pos:"MID",age:22,number:7},
  {name:"Kevin De Bruyne",nation:"Belgium",club:"Man City",pos:"MID",age:33,number:17},
  {name:"Virgil van Dijk",nation:"Netherlands",club:"Liverpool",pos:"DEF",age:33,number:4},
  {name:"Marcus Rashford",nation:"England",club:"Man Utd",pos:"FWD",age:26,number:10},
  {name:"Son Heung-min",nation:"South Korea",club:"Spurs",pos:"FWD",age:31,number:7},
  {name:"Trent Alexander-Arnold",nation:"England",club:"Liverpool",pos:"DEF",age:25,number:66},
  {name:"Declan Rice",nation:"England",club:"Arsenal",pos:"MID",age:25,number:41},
  {name:"Bruno Fernandes",nation:"Portugal",club:"Man Utd",pos:"MID",age:29,number:8},
  {name:"Rodri",nation:"Spain",club:"Man City",pos:"MID",age:27,number:16},
  {name:"Martin Odegaard",nation:"Norway",club:"Arsenal",pos:"MID",age:25,number:8},
  {name:"Cole Palmer",nation:"England",club:"Chelsea",pos:"MID",age:22,number:20},
  {name:"Phil Foden",nation:"England",club:"Man City",pos:"MID",age:24,number:47},
  {name:"Nick Pope",nation:"England",club:"Newcastle",pos:"GK",age:32,number:22},
  {name:"Jarrod Bowen",nation:"England",club:"West Ham",pos:"FWD",age:27,number:20},
  {name:"Alexander Isak",nation:"Sweden",club:"Newcastle",pos:"FWD",age:24,number:14},
  {name:"Dominic Solanke",nation:"England",club:"Spurs",pos:"FWD",age:26,number:9},
  {name:"Noni Madueke",nation:"England",club:"Chelsea",pos:"FWD",age:22,number:11},
  {name:"Ollie Watkins",nation:"England",club:"Aston Villa",pos:"FWD",age:28,number:11},
  {name:"Jacob Ramsey",nation:"England",club:"Aston Villa",pos:"MID",age:23,number:41},
  {name:"James Maddison",nation:"England",club:"Spurs",pos:"MID",age:27,number:10},
  {name:"Emile Smith Rowe",nation:"England",club:"Arsenal",pos:"MID",age:23,number:10},
  {name:"Conor Gallagher",nation:"England",club:"Aston Villa",pos:"MID",age:24,number:23},
  {name:"Levi Colwill",nation:"England",club:"Chelsea",pos:"DEF",age:21,number:26},
  {name:"William Saliba",nation:"France",club:"Arsenal",pos:"DEF",age:23,number:12},
  {name:"Ben White",nation:"England",club:"Arsenal",pos:"DEF",age:26,number:4},
  {name:"Ederson",nation:"Brazil",club:"Man City",pos:"GK",age:30,number:31},
  {name:"Alisson",nation:"Brazil",club:"Liverpool",pos:"GK",age:31,number:1},
  {name:"David Raya",nation:"Spain",club:"Arsenal",pos:"GK",age:28,number:22},
];

const CLUES = [
  p=>`This player wears the number ${p.number} shirt.`,
  p=>`This ${p.pos} plays for ${p.club}.`,
  p=>`This player is ${p.age} years old and represents ${p.nation} internationally.`,
];

function seedRandom(seed){let x=Math.sin(seed+1)*10000;return x-Math.floor(x);}
const todayIdx=Math.floor(seedRandom(Math.floor(Date.now()/86400000))*PLAYERS.length);
const TARGET=PLAYERS[todayIdx];
let guesses=[];
let gameOver=false;

document.getElementById('clue-text').textContent=CLUES[0](TARGET);

function getClue(){
  const idx=Math.min(guesses.length,CLUES.length-1);
  document.getElementById('clue-text').textContent=CLUES[idx](TARGET);
}

function compare(g,t){
  return{
    nation:g.nation===t.nation?'correct':'wrong',
    club:g.club===t.club?'correct':'wrong',
    pos:g.pos===t.pos?'correct':'wrong',
    age:g.age===t.age?'correct':Math.abs(g.age-t.age)<=3?'partial':'wrong',
    number:g.number===t.number?'correct':Math.abs(g.number-t.number)<=5?'partial':'wrong',
  };
}

function renderGuess(player){
  const c=compare(player,TARGET);
  const row=document.createElement('div');
  row.className='guess-row';
  const ageTip=c.age==='partial'?(player.age<TARGET.age?' ↑':' ↓'):'';
  const numTip=c.number==='partial'?(player.number<TARGET.number?' ↑':' ↓'):'';
  row.innerHTML=`
    <div class="cell name wrong">${player.name}</div>
    <div class="cell ${c.nation}">${player.nation}</div>
    <div class="cell ${c.club}">${player.club}</div>
    <div class="cell ${c.pos}">${player.pos}</div>
    <div class="cell ${c.age}">${player.age}${ageTip}</div>
    <div class="cell ${c.number}">${player.number}${numTip}</div>
  `;
  document.getElementById('guesses').prepend(row);
}

function submitGuess(nameOverride){
  if(gameOver)return;
  const input=document.getElementById('guess-input');
  const name=nameOverride||input.value.trim();
  if(!name)return;
  const player=PLAYERS.find(p=>p.name.toLowerCase()===name.toLowerCase());
  if(!player){input.style.borderColor='red';setTimeout(()=>input.style.borderColor='',800);return;}
  if(guesses.find(g=>g.name===player.name)){input.value='';return;}
  guesses.push(player);
  renderGuess(player);
  input.value='';
  document.getElementById('suggest-list').style.display='none';
  document.getElementById('attempt-num').textContent=guesses.length+1;
  getClue();
  if(player.name===TARGET.name){endGame(true);}
  else if(guesses.length>=8){endGame(false);}
}

function endGame(won){
  gameOver=true;
  document.getElementById('guess-input').disabled=true;
  const area=document.getElementById('result-area');
  const emoji=guesses.map(g=>g.name===TARGET.name?'🟩':'🟥').join('');
  const shareText=`PLGuesser ${new Date().toLocaleDateString('en-GB')} ${won?guesses.length:' X'}/8\n${emoji}\nhttps://dailykickoff.github.io`;
  area.innerHTML=`
    <div class="result-box">
      <h2>${won?'⚽ Correct!':'Game Over'}</h2>
      <p>${won?`You got it in ${guesses.length} ${guesses.length===1?'guess':'guesses'}!`:`The answer was <strong>${TARGET.name}</strong>.`}</p>
      <button onclick="location.reload()">Play again (demo)</button>
      <button class="share-btn" onclick="navigator.clipboard&&navigator.clipboard.writeText(\`${shareText}\`).then(()=>alert('Copied! Share on Twitter/X'))">Share result</button>
    </div>
  `;
}

const input=document.getElementById('guess-input');
const sugList=document.getElementById('suggest-list');
input.addEventListener('input',()=>{
  const val=input.value.trim().toLowerCase();
  if(val.length<2){sugList.style.display='none';return;}
  const matches=PLAYERS.filter(p=>p.name.toLowerCase().includes(val)&&!guesses.find(g=>g.name===p.name));
  if(!matches.length){sugList.style.display='none';return;}
  sugList.innerHTML=matches.slice(0,6).map(p=>`<div class="suggest-item" onclick="submitGuess('${p.name}')">${p.name}</div>`).join('');
  sugList.style.display='block';
});
input.addEventListener('keydown',e=>{if(e.key==='Enter')submitGuess();});
document.addEventListener('click',e=>{if(!e.target.closest('.suggestions'))sugList.style.display='none';});
</script>
</body>
</html>
